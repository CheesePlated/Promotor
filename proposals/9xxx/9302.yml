name: No Lingering Instruments
text: |
  Amend rule 106 (Adopting Proposals) by replacing the text reading "Once a proposal finishes taking effect, its power is set to 0." with "If, at any time, a proposal has finished taking effect, its power is set to 0."

  [To see the difference, consider a proposal that took effect before the to-be-replaced language was in place.] 
